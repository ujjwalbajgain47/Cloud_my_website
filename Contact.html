<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ujjwol Portfolio</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
    }

    .card{
      width:350px;
      background:rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius:20px;
      padding:30px;
      text-align:center;
      box-shadow:0 8px 20px rgba(0,0,0,0.3);
    }

    .profile-img{
      width:100px;
      height:100px;
      border-radius:50%;
      background:white;
      margin:0 auto 20px;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:40px;
      color:#2a5298;
      font-weight:bold;
    }

    h1{
      margin-bottom:10px;
    }

    p{
      font-size:15px;
      line-height:1.6;
      margin-bottom:20px;
    }

    .skills{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .skills span{
      background:white;
      color:#2a5298;
      padding:8px 14px;
      border-radius:20px;
      font-size:14px;
      font-weight:bold;
    }

    .contact a{
      display:block;
      text-decoration:none;
      color:white;
      margin:8px 0;
      transition:0.3s;
    }

    .contact a:hover{
      color:#ffd700;
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="profile-img">U</div>

    <h1>Ujjwol</h1>

    <p>
      Passionate web developer who loves creating modern websites 
      and learning new technologies every day.
    </p>

    <div class="skills">
      <span>HTML</span>
      <span>CSS</span>
      <span>JavaScript</span>
    </div>

    <div class="contact">
      <a href="mailto:yourmail@example.com">📧 yourmail@example.com</a>
      <a href="tel:+1234567890">📱 +1234567890</a>
      <a href="#">📍 Your City</a>
    </div>

  </div>

</body>
</html>
